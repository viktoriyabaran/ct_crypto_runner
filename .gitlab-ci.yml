stages:
  - test
  - deploy

test:
  stage: test
  image: python:3.11
  tags:
    - local
  before_script:
    - pip install -r requirements.txt
  script:
    - python3 -m pytest tests/

deploy:
  stage: deploy
  image: alpine:latest
  tags:
    - local
  only:
    - main
  before_script:
    - apk add --no-cache openssh-client
    - chmod 400 $SSH_PRIVATE_KEY
  script:
    - ssh -o StrictHostKeyChecking=no -i $SSH_PRIVATE_KEY $VM_USER@$VM_HOST "
        sudo mkdir -p /opt/vb_service &&
        sudo chown $VM_USER:$VM_USER /opt/vb_service
      "
    - scp -o StrictHostKeyChecking=no -i $SSH_PRIVATE_KEY app.py requirements.txt $VM_USER@$VM_HOST:/opt/vb_service/
    - scp -o StrictHostKeyChecking=no -i $SSH_PRIVATE_KEY vb_service.service $VM_USER@$VM_HOST:/tmp/vb_service.service
    - ssh -o StrictHostKeyChecking=no -i $SSH_PRIVATE_KEY $VM_USER@$VM_HOST "
        cd /opt/vb_service &&
        python3 -m venv venv &&
        source venv/bin/activate &&
        pip install -r requirements.txt &&
        sudo cp /tmp/vb_service.service /etc/systemd/system/ &&
        sudo systemctl daemon-reload &&
        sudo systemctl enable vb_service &&
        sudo systemctl restart vb_service
      "