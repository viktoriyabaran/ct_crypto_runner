<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VB Crypto Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f0f7f0; color: #2d3a2d; padding: 12px 16px; }
        h1 { text-align: center; margin-bottom: 12px; color: #3a7d44; font-size: 22px; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap: 10px; }
        .section {
            background: #fff;
            border: 1px solid #c8e6c9;
            border-radius: 8px;
            padding: 12px;
        }
        .section.full-width { grid-column: 1 / -1; }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            gap: 8px;
        }
        .section-title { font-size: 14px; font-weight: 600; color: #3a7d44; }

        .controls { display: flex; align-items: center; gap: 6px; }
        label { font-size: 12px; color: #6b8e6b; }
        input[type="number"] {
            width: 60px;
            padding: 4px 6px;
            background: #f0f7f0;
            border: 1px solid #a5d6a7;
            border-radius: 4px;
            color: #2d3a2d;
            font-size: 12px;
        }
        select {
            padding: 4px 6px;
            background: #f0f7f0;
            border: 1px solid #a5d6a7;
            border-radius: 4px;
            color: #2d3a2d;
            font-size: 12px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .metric-card {
            background: #f0f7f0;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            border: 1px solid #c8e6c9;
        }
        .metric-card .label { font-size: 10px; color: #6b8e6b; text-transform: uppercase; letter-spacing: 0.3px; }
        .metric-card .value { font-size: 16px; font-weight: 700; margin-top: 2px; color: #2e7d32; }

        #chart-container { width: 100%; height: 300px; }

        .prices-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .prices-table th, .prices-table td {
            padding: 4px 8px;
            text-align: left;
            border-bottom: 1px solid #e8f5e9;
        }
        .prices-table th { color: #6b8e6b; text-transform: uppercase; font-size: 10px; }
        .prices-table td { color: #2d3a2d; }
        .prices-scroll { max-height: 260px; overflow-y: auto; }

        .error { color: #c62828; text-align: center; padding: 12px; font-size: 13px; }
        .loading { color: #6b8e6b; text-align: center; padding: 12px; font-size: 13px; }
        .status-text { font-size: 11px; color: #81c784; margin-top: 4px; }
    </style>
</head>
<body>
    <h1>Stellar (XLM) Dashboard</h1>

    <div class="dashboard">
        <!-- Metrics Section -->
        <div class="section">
            <div class="section-header">
                <span class="section-title">Metrics</span>
            </div>
            <div id="metrics-content">
                <div class="loading">Loading...</div>
            </div>
        </div>

        <!-- Price History Section -->
        <div class="section">
            <div class="section-header">
                <span class="section-title">Price History</span>
                <div class="controls">
                    <label for="price-limit">Limit:</label>
                    <input type="number" id="price-limit" value="20" min="1" max="1000">
                </div>
            </div>
            <div class="prices-scroll">
                <div id="prices-content">
                    <div class="loading">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Candlestick Chart Section -->
        <div class="section full-width">
            <div class="section-header">
                <span class="section-title">Candlestick Chart</span>
                <div class="controls">
                    <label for="chart-interval">Interval:</label>
                    <select id="chart-interval">
                        <option value="1h">1H</option>
                        <option value="4h">4H</option>
                        <option value="1d">1D</option>
                    </select>
                </div>
                <div id="chart-status" class="status-text"></div>
            </div>
            <div id="chart-container">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://function-bun-production-bdfe7.up.railway.app";
        let chart = null, candleSeries = null;

        async function loadMetrics() {
            document.getElementById('metrics-content').innerHTML = '<div class="loading">Loading...</div>';
            try {
                const res = await fetch(`${API}/api/metrics`);
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                document.getElementById('metrics-content').innerHTML = `
                    <div class="metrics-grid">
                        <div class="metric-card"><div class="label">Latest Price</div><div class="value">$${data.latest}</div></div>
                        <div class="metric-card"><div class="label">Min</div><div class="value">$${data.min}</div></div>
                        <div class="metric-card"><div class="label">Max</div><div class="value">$${data.max}</div></div>
                        <div class="metric-card"><div class="label">Mean</div><div class="value">$${data.mean}</div></div>
                        <div class="metric-card"><div class="label">Std Dev</div><div class="value">${data.stddev}</div></div>
                        <div class="metric-card"><div class="label">Change</div><div class="value" style="color:${data.change_percent >= 0 ? '#2e7d32' : '#c62828'}">${data.change_percent}%</div></div>
                        <div class="metric-card"><div class="label">Data Points</div><div class="value">${data.count}</div></div>
                        <div class="metric-card"><div class="label">Median</div><div class="value">$${data.median}</div></div>
                        <div class="metric-card"><div class="label">Period</div><div class="value" style="font-size:11px">${new Date(data.first_timestamp).toLocaleDateString()} - ${new Date(data.last_timestamp).toLocaleDateString()}</div></div>
                    </div>
                `;
            } catch (e) {
                document.getElementById('metrics-content').innerHTML = `<div class="error">Error: ${e.message}</div>`;
            }
        }

        async function loadChart() {
            const interval = document.getElementById('chart-interval').value;
            document.getElementById('chart-status').textContent = 'Loading...';

            try {
                if (!chart) {
                    document.getElementById('chart-container').innerHTML = '';
                    chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                        layout: { background: { color: '#ffffff' }, textColor: '#2d3a2d' },
                        grid: { vertLines: { color: '#e8f5e9' }, horzLines: { color: '#e8f5e9' } },
                        width: document.getElementById('chart-container').offsetWidth,
                        height: 300,
                        timeScale: { timeVisible: true, secondsVisible: false },
                    });
                    candleSeries = chart.addCandlestickSeries({
                        upColor: '#4caf50', downColor: '#ef5350',
                        borderUpColor: '#388e3c', borderDownColor: '#c62828',
                        wickUpColor: '#388e3c', wickDownColor: '#c62828',
                    });
                    window.addEventListener('resize', () => {
                        chart.applyOptions({ width: document.getElementById('chart-container').offsetWidth });
                    });
                }

                const res = await fetch(`${API}/api/candlestick?interval=${interval}`);
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                const formatted = data.data.map(c => ({
                    time: Math.floor(new Date(c.time).getTime() / 1000),
                    open: c.open, high: c.high, low: c.low, close: c.close,
                }));

                candleSeries.setData(formatted);
                chart.timeScale().fitContent();
                document.getElementById('chart-status').textContent =
                    `${data.data.length} candles (${interval}) at ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                document.getElementById('chart-status').innerHTML = `<span style="color:#c62828">${e.message}</span>`;
            }
        }

        async function loadPrices() {
            const limit = document.getElementById('price-limit').value;
            document.getElementById('prices-content').innerHTML = '<div class="loading">Loading...</div>';
            try {
                const res = await fetch(`${API}/api/prices?limit=${limit}`);
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                if (data.data.length === 0) {
                    document.getElementById('prices-content').innerHTML = '<div class="loading">No data</div>';
                } else {
                    let rows = data.data.map(r => `
                        <tr>
                            <td>${new Date(r.timestamp).toLocaleString()}</td>
                            <td>${r.coin}</td>
                            <td>$${Number.parseFloat(r.price).toFixed(6)}</td>
                        </tr>
                    `).join('');

                    document.getElementById('prices-content').innerHTML = `
                        <table class="prices-table">
                            <thead><tr><th>Timestamp</th><th>Coin</th><th>Price</th></tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    `;
                }
            } catch (e) {
                document.getElementById('prices-content').innerHTML = `<div class="error">Error: ${e.message}</div>`;
            }
        }

        // Auto-load all data on page open
        document.addEventListener('DOMContentLoaded', () => {
            loadMetrics();
            loadChart();
            loadPrices();
        });

        // Reload on-demand when controls change
        document.getElementById('chart-interval').addEventListener('change', loadChart);
        document.getElementById('price-limit').addEventListener('change', loadPrices);
    </script>
</body>
</html>
